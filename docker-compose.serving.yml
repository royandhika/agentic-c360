services:
  streamlit:
    build:
      context: ./streamlit_app
    container_name: c360-streamlit
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
    networks:
      - wanderfuel-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

networks:
  wanderfuel-net:
    external: true
    name: wanderfuel-net
