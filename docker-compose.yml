services:
  app_oltp:
    image: postgres:16
    container_name: app_oltp
    environment:
      POSTGRES_USER: ${POSTGRES_APP_USER}
      POSTGRES_PASSWORD: ${POSTGRES_APP_PASS}
      POSTGRES_DB: ${POSTGRES_APP_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
      - ./simulation/sources/app_oltp/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_APP_USER} -d ${POSTGRES_APP_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wanderfuel-net

  vendor_api:
    build:
      context: ./simulation/sources/vendor_api
      dockerfile: Dockerfile
    container_name: vendor_api
    user: "1000:1000"
    ports:
      - "8000:8000"
    environment:
      VENDOR_DB_PATH: /app/store/vendor.db
    volumes:
      - ./simulation/sources/vendor_api:/app
    depends_on:
      app_oltp:
        condition: service_healthy
    networks:
      - wanderfuel-net

  crm_sftp:
    image: atmoz/sftp:alpine
    container_name: crm_sftp
    ports:
      - "2222:22"
    volumes:
      - ./simulation/sources/crm_sftp/tickets:/home/crm_vendor/tickets
    command: ${CRM_SFTP_USER}:${CRM_SFTP_PASS}:1000:1000:tickets
    healthcheck:
      test: ["CMD-SHELL", "ss -tlnp | grep :22"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wanderfuel-net

volumes:
  postgres_app_data:

networks:
  wanderfuel-net:
    driver: bridge
