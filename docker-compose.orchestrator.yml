services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest-alpine
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9004:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "${CLICKHOUSE_USER}", "--password", "${CLICKHOUSE_PASSWORD}", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - wanderfuel-net

  dagster-webserver:
    build:
      context: ./dagster_pipeline
      dockerfile: Dockerfile
    container_name: dagster-webserver
    ports:
      - "3000:3000"
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_pipeline/dagster_home
      PYTHONPATH: /opt/dagster/dagster_pipeline
      POSTGRES_APP_HOST: app_oltp
      POSTGRES_APP_PORT: 5432
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASS: ${POSTGRES_APP_PASS}
      POSTGRES_APP_DB: ${POSTGRES_APP_DB}
      POSTGRES_DAGSTER_DB: ${POSTGRES_DAGSTER_DB}
      CRM_SFTP_HOST: crm_sftp
      CRM_SFTP_PORT: 22
      CRM_SFTP_USER: ${CRM_SFTP_USER}
      CRM_SFTP_PASS: ${CRM_SFTP_PASS}
      CRM_SFTP_PATH: ${CRM_SFTP_PATH:-tickets}
      VENDOR_API_URL: http://vendor_api:8000
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      DBT_PROJECT_DIR: /opt/dagster/dbt
      DBT_PROFILES_DIR: /opt/dagster/ops
    volumes:
      - ./dagster_pipeline:/opt/dagster/dagster_pipeline
      - ./dbt:/opt/dagster/dbt
      - ./ops:/opt/dagster/ops
    depends_on:
      clickhouse:
        condition: service_healthy
    command:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - /opt/dagster/dagster_pipeline/workspace.yaml
    networks:
      - wanderfuel-net

  dagster-daemon:
    build:
      context: ./dagster_pipeline
      dockerfile: Dockerfile
    container_name: dagster-daemon
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_pipeline/dagster_home
      PYTHONPATH: /opt/dagster/dagster_pipeline
      POSTGRES_APP_HOST: app_oltp
      POSTGRES_APP_PORT: 5432
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASS: ${POSTGRES_APP_PASS}
      POSTGRES_APP_DB: ${POSTGRES_APP_DB}
      POSTGRES_DAGSTER_DB: ${POSTGRES_DAGSTER_DB}
      CRM_SFTP_HOST: crm_sftp
      CRM_SFTP_PORT: 22
      CRM_SFTP_USER: ${CRM_SFTP_USER}
      CRM_SFTP_PASS: ${CRM_SFTP_PASS}
      CRM_SFTP_PATH: ${CRM_SFTP_PATH:-tickets}
      VENDOR_API_URL: http://vendor_api:8000
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      DBT_PROJECT_DIR: /opt/dagster/dbt
      DBT_PROFILES_DIR: /opt/dagster/ops
    volumes:
      - ./dagster_pipeline:/opt/dagster/dagster_pipeline
      - ./dbt:/opt/dagster/dbt
      - ./ops:/opt/dagster/ops
    depends_on:
      clickhouse:
        condition: service_healthy
    command:
      - dagster-daemon
      - run
      - -w
      - /opt/dagster/dagster_pipeline/workspace.yaml
    networks:
      - wanderfuel-net

volumes:
  clickhouse_data:

networks:
  wanderfuel-net:
    name: wanderfuel-net
    external: true